<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С Днём Рождения 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url('your-balloons-image.jpg') no-repeat center/cover;
    font-family: 'Comic Sans MS', cursive;
}

body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(255,255,255,0.15), rgba(0,0,0,0.35));
}

.envelope {
    position: relative;
    width: 420px; 
    height: 300px; 
    background: linear-gradient(135deg, #f8bbd0, #f3e5f5);
    border-radius: 20px;
    cursor: pointer;
    perspective: 1000px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    z-index: 1;
}

.flap {
    position: absolute;
    width: 100%;
    height: 130px;
    top: 0;
    left: 0;
    background: linear-gradient(135deg, #f48fb1, #ce93d8);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top;
    transition: transform 0.7s ease;
    z-index: 2;
}

.letter {
    position: absolute;
    width: 88%;
    height: auto; 
    background: #111;
    top: 12%;
    left: 6%;
    border-radius: 20px;
    padding: 20px;
    box-sizing: border-box;
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.7s ease;
    box-shadow: 0 0 25px rgba(255,105,180,0.7);
}

.open .flap {
    transform: rotateX(-140deg);
}

.open .letter {
    opacity: 1;
    transform: translateY(0);
}

.text {
    text-align: center;
    font-size: 16px; 
    color: #ff4d88;
    line-height: 1.5;
    text-shadow: 0 0 12px rgba(255,105,180,0.7);
}
</style>
</head>

<body>

<div class="envelope" onclick="openEnvelope(this)">
    <div class="flap"></div>

    <div class="letter">
        <div class="text">
            💖 С Днём Рождения вас, Дарья! 💖<br><br>
            Я очень рад что вам испольнилось... лет<br>
            Пусть твоя жизнь будет наполнена радостью,<br>
            кактусами, любовью и яркими моментами ❤️
        </div>
    </div>
</div>

<audio id="bgMusic" src="music.mp3"></audio>

<script>
function openEnvelope(el) {
    el.classList.toggle('open');

    const music = document.getElementById('bgMusic');
    music.play();
}
</script>

</body>
</html>
